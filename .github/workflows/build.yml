name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Needed so the tag build can publish a GitHub Release with the binaries.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: timetracker
            asset: timetracker-linux
            artifact: timetracker-linux
          - os: macos-latest
            bin: timetracker
            asset: timetracker-macos
            artifact: timetracker-macos
          - os: windows-latest
            bin: timetracker.exe
            asset: timetracker-windows.exe
            artifact: timetracker-windows
    steps:
      - uses: actions/checkout@v4

      # GPUI's Linux backend (Blade/Vulkan + wayland/x11 + fontconfig) needs
      # these dev packages or the build fails at link time.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig-dev libfreetype-dev \
            libvulkan-dev libgl1-mesa-dev \
            libssl-dev libzstd-dev \
            pkg-config cmake clang

      # Xcode 26 ships `metal` as a stub; the Metal Toolchain is a separate
      # on-demand component. Download it only if it isn't already present.
      - name: Ensure Metal toolchain
        if: runner.os == 'macOS'
        run: xcrun metal --version || xcodebuild -downloadComponent MetalToolchain

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

      # On a v* tag, publish (or append to) the GitHub Release and attach the
      # binary. Each matrix job appends its own platform binary.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: true
